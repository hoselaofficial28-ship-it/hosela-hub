<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Reset Hosela Hub</title>
  <style>
    :root {
      --blue: #0876f2;
      --blue-dark: #0459c9;
      --text: #102033;
      --muted: #6f7c8d;
      --soft: #edf5ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      align-items: center;
      background: linear-gradient(160deg, #e8f3ff 0%, #ffffff 52%, #f4f8ff 100%);
      color: var(--text);
      display: flex;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }

    .reset-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(8, 118, 242, 0.12);
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(16, 32, 51, 0.13);
      max-width: 420px;
      padding: 36px 28px;
      text-align: center;
      width: 100%;
    }

    .brand {
      align-items: center;
      display: inline-flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .brand img {
      height: 46px;
      width: 46px;
    }

    .brand strong {
      font-size: 22px;
      letter-spacing: 0;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 10px;
    }

    p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
      margin: 0;
    }

    .loader {
      animation: spin 0.8s linear infinite;
      border: 4px solid var(--soft);
      border-top-color: var(--blue);
      border-radius: 999px;
      height: 44px;
      margin: 28px auto 0;
      width: 44px;
    }

    .fallback {
      background: var(--blue);
      border: 0;
      border-radius: 16px;
      color: #fff;
      cursor: pointer;
      display: none;
      font: inherit;
      font-weight: 700;
      margin-top: 26px;
      padding: 14px 18px;
      width: 100%;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <main class="reset-card">
    <div class="brand">
      <img src="assets/logo.png" alt="Hosela Hub">
      <strong>Hosela Hub</strong>
    </div>
    <h1>Membersihkan cache lama</h1>
    <p>Chrome sedang disegarkan supaya tidak memakai file lama yang menyebabkan koneksi gagal.</p>
    <div class="loader" aria-hidden="true"></div>
    <button class="fallback" type="button" id="openApp">Buka Aplikasi</button>
  </main>

  <script>
    (function() {
      var version = '20260611a';
      var target = './index.html?v=' + version + '&clean=' + Date.now();
      var button = document.getElementById('openApp');

      function clearStorage() {
        try { localStorage.clear(); } catch (err) {}
        try { sessionStorage.clear(); } catch (err) {}
      }

      function clearCaches() {
        if (!('caches' in window)) return Promise.resolve();
        return caches.keys().then(function(keys) {
          return Promise.all(keys.map(function(key) {
            return caches.delete(key);
          }));
        }).catch(function() {});
      }

      function unregisterServiceWorkers() {
        if (!('serviceWorker' in navigator) || !navigator.serviceWorker.getRegistrations) {
          return Promise.resolve();
        }
        return navigator.serviceWorker.getRegistrations().then(function(registrations) {
          return Promise.all(registrations.map(function(registration) {
            return registration.unregister();
          }));
        }).catch(function() {});
      }

      function goHome() {
        location.replace(target);
      }

      button.addEventListener('click', goHome);
      clearStorage();
      Promise.resolve()
        .then(clearCaches)
        .then(unregisterServiceWorkers)
        .then(function() {
          setTimeout(goHome, 500);
        })
        .catch(goHome);

      setTimeout(function() {
        button.style.display = 'block';
      }, 3500);
    })();
  </script>
</body>
</html>
