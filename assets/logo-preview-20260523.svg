<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7faff"/>
      <stop offset="1" stop-color="#eaf2ff"/>
    </linearGradient>
    <linearGradient id="logoBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5c93ff"/>
      <stop offset=".52" stop-color="#1557d8"/>
      <stop offset="1" stop-color="#0f3f9b"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd56a"/>
      <stop offset="1" stop-color="#f4a91f"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1557d8" flood-opacity=".24"/>
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#101828" flood-opacity=".13"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#101828" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#pageBg)"/>
  <text x="90" y="86" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="900" fill="#101828">Preview Logo Hosela Hub</text>
  <text x="90" y="124" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="650" fill="#667085">Tanpa stroke putih, pakai gradasi biru dan shadow lembut agar lebih menyatu dengan UI app.</text>

  <g transform="translate(90 190)" filter="url(#cardShadow)">
    <rect width="300" height="360" rx="28" fill="#ffffff"/>
    <text x="34" y="54" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="850" fill="#101828">App icon</text>
    <g transform="translate(62 86)" filter="url(#softShadow)">
      <rect width="176" height="176" rx="42" fill="url(#logoBlue)"/>
      <rect x="53" y="45" width="26" height="80" rx="2" fill="#ffffff"/>
      <rect x="97" y="45" width="26" height="80" rx="2" fill="#ffffff"/>
      <rect x="53" y="78" width="70" height="20" rx="2" fill="#ffffff"/>
      <rect x="32" y="146" width="112" height="9" rx="4.5" fill="url(#goldLine)"/>
    </g>
    <text x="34" y="304" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#667085">Untuk login/loading</text>
  </g>

  <g transform="translate(450 190)" filter="url(#cardShadow)">
    <rect width="300" height="360" rx="28" fill="#1557d8"/>
    <text x="34" y="54" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="850" fill="#ffffff">Di header biru</text>
    <g transform="translate(91 104)" filter="url(#softShadow)">
      <rect width="118" height="118" rx="30" fill="url(#logoBlue)"/>
      <rect x="36" y="30" width="18" height="54" rx="1.5" fill="#ffffff"/>
      <rect x="65" y="30" width="18" height="54" rx="1.5" fill="#ffffff"/>
      <rect x="36" y="52" width="47" height="14" rx="1.5" fill="#ffffff"/>
      <rect x="22" y="98" width="74" height="6" rx="3" fill="url(#goldLine)"/>
    </g>
    <text x="34" y="304" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#c7d7fe">Tidak ada outline putih</text>
  </g>

  <g transform="translate(810 190)" filter="url(#cardShadow)">
    <rect width="300" height="360" rx="28" fill="#ffffff"/>
    <text x="34" y="54" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="850" fill="#101828">Home card</text>
    <rect x="34" y="88" width="232" height="182" rx="22" fill="#f8fbff" stroke="#dfe8f4"/>
    <g transform="translate(52 110)" filter="url(#softShadow)">
      <rect width="64" height="64" rx="18" fill="url(#logoBlue)"/>
      <rect x="19" y="16" width="10" height="30" rx="1" fill="#ffffff"/>
      <rect x="35" y="16" width="10" height="30" rx="1" fill="#ffffff"/>
      <rect x="19" y="28" width="26" height="8" rx="1" fill="#ffffff"/>
      <rect x="12" y="53" width="40" height="4" rx="2" fill="url(#goldLine)"/>
    </g>
    <text x="132" y="134" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="900" fill="#101828">Hosela Hub</text>
    <text x="132" y="158" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#667085">Lebih ringan dan clean</text>
  </g>
</svg>
